<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup 2026 · Prediction Net</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{
    --bg:#05080d; --panel:rgba(14,22,33,.7); --line:rgba(80,220,200,.16);
    --cline:rgba(120,160,160,.32);
    --teal:#2af0c8; --sky:#49b6ff; --lime:#a6f24d; --amber:#ffce4d; --red:#ff6b6b;
    --ink:#e6f3f0; --muted:#86a0a0; --faint:#5a7373;
    --disp:"Chakra Petch",sans-serif; --sans:"Inter",sans-serif; --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;
    background:radial-gradient(900px 600px at 85% -5%,rgba(42,240,200,.12),transparent 55%),
      radial-gradient(700px 600px at 0% 100%,rgba(73,182,255,.12),transparent 55%),var(--bg);background-attachment:fixed;min-height:100vh}
  .mesh{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;
    background-image:radial-gradient(circle,rgba(42,240,200,.5) 1px,transparent 1.4px);background-size:34px 34px;
    mask-image:radial-gradient(circle at 60% 12%,#000,transparent 78%)}
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 22px 70px}
  header{display:flex;justify-content:space-between;align-items:center;padding:22px 0 16px;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:13px}
  .node-logo{width:42px;height:42px;position:relative;flex:0 0 auto}
  .node-logo span{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
  .node-logo span:nth-child(2){right:0;background:var(--sky);box-shadow:0 0 8px var(--sky)}
  .node-logo span:nth-child(3){bottom:0;left:50%;transform:translateX(-50%);background:var(--lime);box-shadow:0 0 8px var(--lime)}
  .node-logo:before{content:"";position:absolute;inset:4px;border:1px solid var(--line);border-radius:50%}
  .brand h1{font-family:var(--disp);font-size:16px;margin:0;font-weight:700;letter-spacing:.06em}
  .brand p{margin:0;font-size:11.5px;color:var(--teal)}
  .status{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 9px var(--teal);animation:p 1.6s infinite}
  @keyframes p{50%{opacity:.35}}
  .btn{font:inherit;font-size:12px;color:var(--bg);background:var(--teal);border:none;border-radius:8px;padding:8px 15px;cursor:pointer;font-weight:600}
  .tabs{display:flex;gap:8px;margin:8px 0 18px;flex-wrap:wrap}
  .tab{font-family:var(--disp);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    padding:9px 18px;cursor:pointer;border:1px solid transparent;background:none;border-radius:8px}
  .tab.on{color:var(--teal);border-color:var(--line);background:rgba(42,240,200,.07)}
  .seed{font-size:12px;color:#ffd28a;border:1px solid rgba(255,180,80,.3);background:rgba(255,170,60,.06);border-radius:8px;padding:8px 14px;margin-bottom:18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(12px)}
  .pt{font-family:var(--disp);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);
    padding:14px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .pt .tag{color:var(--teal)}
  .body{padding:18px 22px}
  h2.sec{font-family:var(--disp);font-size:14px;letter-spacing:.08em;margin:24px 0 10px;color:var(--ink)}
  .hide{display:none}
  a{color:var(--sky);text-decoration:none}
  footer{font-family:var(--disp);font-size:10.5px;color:var(--faint);text-align:center;margin-top:26px;letter-spacing:.07em;text-transform:uppercase}

  /* overview */
  .net{padding:10px 8px 0}
  .net svg{width:100%;height:auto;display:block}
  .nlink{fill:none}
  .pulse{stroke-dasharray:5 11;animation:flow 1.6s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-32}}
  .out{padding:4px 22px 22px;display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .outbox{flex:1 1 200px}
  .outbox .ol{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .outbox .on{font-family:var(--disp);font-size:30px;font-weight:700}
  .outbox .on .fl{margin-right:8px}
  .bigp{font-family:var(--disp);font-size:60px;font-weight:700;line-height:1;color:var(--teal);text-shadow:0 0 26px rgba(42,240,200,.45)}
  .bigp small{font-size:22px;color:var(--muted)}
  .conf{flex:1 1 260px}
  .conf .cl{font-size:11.5px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
  .meter{height:11px;border-radius:7px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid var(--line)}
  .meter i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,var(--sky),var(--teal),var(--lime));box-shadow:0 0 14px rgba(42,240,200,.5)}
  .cols{display:grid;grid-template-columns:1.05fr 1fr;gap:18px;margin-top:18px}
  .lead{display:grid;grid-template-columns:84px 1fr 48px;align-items:center;gap:12px;padding:6px 0;font-size:13px}
  .lead .tk{height:7px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden}
  .lead .tk i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--sky),var(--teal))}
  .lead .tk.d i{background:#3a5560}
  .lead .lp{text-align:right;font-weight:600;color:var(--teal)}.lead .lp.d{color:var(--muted)}
  .leg{display:flex;gap:15px;font-size:10.5px;color:var(--muted);margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em;flex-wrap:wrap}
  .leg b{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}
  .step{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(80,220,200,.08)}
  .step:last-child{border-bottom:none}
  .step .rd{font-family:var(--disp);font-size:11px;color:var(--faint)}
  .step .op{font-size:14px;font-weight:500}.step .op em{font-style:normal;font-size:11px;color:var(--muted);display:block}
  .step .pc{font-family:var(--disp);font-weight:700;font-size:17px;text-align:right;min-width:52px}
  .pc.hi{color:var(--teal)}.pc.md{color:var(--lime)}.pc.lo{color:var(--amber)}
  .sbar{grid-column:1/-1;height:4px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:-5px}
  .sbar i{display:block;height:100%;border-radius:5px}
  .mod{display:flex;flex-direction:column;gap:16px}
  .mod .mt{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:7px}
  .mod .mt b{color:var(--teal)}
  .mb{height:9px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
  .mb i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--sky),var(--teal))}
  .why{font-size:14.5px;line-height:1.7;color:#bcd2ce}.why b{color:var(--teal)}

  /* bracket */
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-bottom:14px;align-items:center}
  .legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}
  .legend .pathkey{display:inline-block;width:18px;height:0;border-top:2px solid var(--teal);margin-right:6px;vertical-align:3px}
  .scroller{overflow-x:auto;padding-bottom:10px}
  .bracket{display:flex;min-width:1080px;height:840px}
  .col{display:flex;flex-direction:column;flex:1 1 0;min-width:150px}
  .rhead{font-family:var(--disp);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);text-align:center;padding:6px 0 10px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .col.champ{flex:0 0 168px}
  .round{flex:1;display:flex;flex-direction:column;justify-content:space-around;position:relative}
  .round.pr{padding-right:16px}
  .round.pl{padding-left:16px}
  .tie{position:relative;flex:1;display:flex;flex-direction:column;justify-content:center}
  .round.pr .tie::after{content:"";position:absolute;width:16px;right:0;border-right:1px solid var(--cline)}
  .round.pr .tie.top::after{top:50%;bottom:0;border-top:1px solid var(--cline)}
  .round.pr .tie.bot::after{top:0;bottom:50%;border-bottom:1px solid var(--cline)}
  .round.pl .tie::before{content:"";position:absolute;left:0;width:16px;top:50%;border-top:1px solid var(--cline)}
  .round.pr .tie.path::after{border-color:var(--teal)}
  .round.pl .tie.path::before{border-color:var(--teal)}
  .card{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;backdrop-filter:blur(8px)}
  .tie.path .card{border-color:rgba(42,240,200,.5);box-shadow:0 0 12px rgba(42,240,200,.12)}
  .team{display:flex;justify-content:space-between;align-items:center;gap:6px;padding:6px 10px;font-size:12.5px;color:var(--muted)}
  .team+.team{border-top:1px solid rgba(80,220,200,.08)}
  .team.win{color:var(--ink);font-weight:600}
  .team .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team .p{font-family:var(--disp);font-weight:700;font-size:12px;flex:0 0 auto}
  .team.win.hi .p{color:var(--teal)}.team.win.md .p{color:var(--lime)}.team.win.lo .p{color:var(--amber)}
  .team.win.hi{box-shadow:inset 3px 0 0 var(--teal)}.team.win.md{box-shadow:inset 3px 0 0 var(--lime)}.team.win.lo{box-shadow:inset 3px 0 0 var(--amber)}
  .champcard{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:rgba(12,42,38,.6);border:1.5px solid var(--teal);border-radius:12px;padding:18px 12px;box-shadow:0 0 26px rgba(42,240,200,.2)}
  .champcard .tr{font-size:26px;margin-bottom:8px}.champcard .fl{font-size:22px}
  .champcard .cn{font-family:var(--disp);font-size:18px;font-weight:700;margin-top:4px}
  .champcard .co{font-family:var(--disp);font-size:30px;font-weight:700;color:var(--teal);margin-top:8px;text-shadow:0 0 16px rgba(42,240,200,.5)}
  .champcard .cl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}.note b{color:var(--ink)}

  /* data */
  .ingest{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);border-radius:0 0 14px 14px;overflow:hidden}
  .ing{background:#0a121c;padding:15px 18px}
  .ing .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .ing .v{font-family:var(--disp);font-size:18px;font-weight:700}
  .ing .v small{font-size:12px;color:var(--muted);font-weight:400;font-family:var(--sans)}
  .ing .ok{color:var(--teal)}
  .checks{display:flex;flex-wrap:wrap;gap:8px;padding:14px 22px;border-top:1px solid var(--line)}
  .chk{font-family:var(--mono);font-size:11px;color:var(--muted);background:rgba(42,240,200,.06);border:1px solid var(--line);border-radius:20px;padding:5px 12px}
  .chk b{color:var(--teal)}
  .chips{display:flex;gap:8px;margin:20px 0 16px;flex-wrap:wrap}
  .chip{font-family:var(--disp);font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 15px;border:1px solid var(--line);border-radius:20px;cursor:pointer;background:rgba(255,255,255,.02)}
  .chip.on{color:var(--bg);background:var(--teal);border-color:var(--teal);font-weight:700}
  .chip .n{opacity:.7;font-family:var(--mono);margin-left:6px}
  .groups{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .grp h3{font-family:var(--disp);font-size:13px;letter-spacing:.1em;margin:0;padding:13px 18px 10px;color:var(--sky)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:400;text-align:right;padding:4px 8px;border-bottom:1px solid var(--line)}
  thead th.l{text-align:left;padding-left:18px}
  tbody td{padding:7px 8px;text-align:right;border-bottom:1px solid rgba(80,220,200,.06);font-variant-numeric:tabular-nums}
  tbody td.l{text-align:left;padding-left:18px;font-weight:500}
  tbody td.pts{color:var(--teal);font-weight:700;font-family:var(--disp)}
  tbody tr.q td.l{position:relative}
  tbody tr.q td.l:before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);width:4px;height:18px;border-radius:2px;background:var(--teal)}
  tbody tr.q2 td.l:before{background:var(--sky)}
  .pos{color:var(--faint);font-family:var(--mono);font-size:11px;padding-right:4px}
  .res{display:grid;grid-template-columns:1fr auto 1fr 96px;gap:12px;align-items:center;padding:11px 22px;border-bottom:1px solid rgba(80,220,200,.07);font-size:13.5px}
  .res .ta{text-align:right;font-weight:500}.res .tb{text-align:left;font-weight:500}
  .res .sc{font-family:var(--disp);font-weight:700;font-size:15px;white-space:nowrap}
  .res .delta{font-family:var(--mono);font-size:11px;text-align:right}
  .res .delta .up{color:var(--lime)}.res .delta .dn{color:var(--red)}
  .res .meta{grid-column:1/-1;font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:-4px}
  .res .meta b{color:var(--muted)}
  .empty{padding:46px 22px;text-align:center;color:var(--muted)}
  .empty .ei{font-size:30px;color:var(--faint);margin-bottom:10px}.empty b{color:var(--ink)}

  /* betting */
  .disc{font-size:12.5px;color:#ffd28a;border:1px solid rgba(255,180,80,.35);background:rgba(255,170,60,.07);
    border-radius:12px;padding:12px 16px;margin-bottom:18px;line-height:1.55}
  .disc b{color:#ffe0a8}
  .betsrc{font-family:var(--mono);font-size:11px;color:var(--faint);margin:0 0 14px}
  .betgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .bet{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;backdrop-filter:blur(10px)}
  .bet.value{border-color:rgba(42,240,200,.5);box-shadow:0 0 14px rgba(42,240,200,.1)}
  .bh{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:11px}
  .bh b{font-weight:600}.bh .vs{color:var(--faint);font-size:12px}
  .vchip{margin-left:auto;font-family:var(--disp);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
  .vchip.value{color:var(--bg);background:var(--teal)}
  .vchip.diverge{color:var(--amber);background:rgba(255,206,77,.12);border:1px solid rgba(255,206,77,.4)}
  .vchip.agree{color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line)}
  .o3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
  .ob{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center}
  .ob.pick{border-color:var(--teal);background:rgba(42,240,200,.08)}
  .ob.mfav{border-color:rgba(73,182,255,.4)}
  .ob .ol{font-size:10.5px;color:var(--muted);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ob .ov{font-family:var(--disp);font-size:17px;font-weight:700;display:block;margin:2px 0}
  .ob .om{font-size:10px;color:var(--faint);display:block}
  .ob.pick .ov{color:var(--teal)}
  .bn{font-size:12px;color:#bcd2ce;line-height:1.5}
  .otable{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  .otable th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
    font-weight:400;text-align:right;padding:7px 10px;border-bottom:1px solid var(--line)}
  .otable th.l{text-align:left}
  .otable td{padding:9px 10px;text-align:right;border-bottom:1px solid rgba(80,220,200,.06);font-variant-numeric:tabular-nums}
  .otable td.l{text-align:left;font-weight:500}
  .otable .ev.value{color:var(--teal);font-weight:600}.otable .ev.lean{color:var(--lime)}.otable .ev.no-value{color:var(--muted)}
  .legend2{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin:2px 0 14px}
  .legend2 b{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}

  /* scorecard */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;backdrop-filter:blur(10px)}
  .metric .ml{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .metric .mv{font-family:var(--disp);font-size:30px;font-weight:700;color:var(--teal);line-height:1}
  .metric .mv small{font-size:14px;color:var(--muted)}
  .metric .ms{font-size:12px;color:var(--muted);margin-top:6px}
  .obreak{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .evo{padding:18px 22px}
  .evo svg{width:100%;height:auto;display:block;overflow:visible}
  .evosum{font-size:13px;color:#bcd2ce;line-height:1.6;margin:12px 0 0}
  .evosum b{color:var(--teal)}
  .sctable{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  .sctable th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:400;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  .sctable th.c,.sctable td.c{text-align:center}
  .sctable td{padding:9px 10px;border-bottom:1px solid rgba(80,220,200,.06);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;text-align:left}
  .sctable .fix{font-weight:500}
  .sctable .sc-pred{color:var(--muted)}
  .sctable .res{display:inline;font-family:var(--disp);font-weight:700;margin-right:6px}
  .sctable .rname{color:var(--muted);font-size:12px}
  .verdict{font-family:var(--disp);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .verdict.ok{color:var(--bg);background:var(--teal)}
  .verdict.no{color:var(--red);background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.4)}
  /* champion progress (overview) */
  .cprog{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:4px 0 14px}
  .cstat{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .cstat .cl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .cstat .cvv{font-family:var(--disp);font-size:19px;font-weight:700}
  .cstat .cvv.up{color:var(--lime)}.cstat .cvv.dn{color:var(--red)}
  .formdots span{display:inline-block;width:17px;height:17px;border-radius:5px;font-family:var(--disp);font-size:10px;
    font-weight:700;text-align:center;line-height:17px;margin-right:3px;color:var(--bg)}
  .fd-w{background:var(--teal)}.fd-d{background:var(--amber)}.fd-l{background:var(--red)}

  /* methodology */
  .flow{display:grid;grid-template-columns:repeat(3,1fr) .4fr 1fr;gap:10px;align-items:stretch;margin-bottom:30px}
  .fstep{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;backdrop-filter:blur(10px)}
  .fstep .n{font-family:var(--disp);font-size:11px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
  .fstep h4{font-family:var(--disp);font-size:14px;margin:8px 0 6px;color:var(--teal)}
  .fstep p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.55}
  .arrow{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:22px}
  .fout{background:rgba(12,42,38,.55);border:1.5px solid var(--teal);border-radius:12px;padding:16px;display:flex;flex-direction:column;justify-content:center}
  .fout .n{font-family:var(--disp);font-size:11px;letter-spacing:.1em;color:var(--teal);text-transform:uppercase}

  .mpanel{padding:22px 26px;margin-bottom:18px}

  .wt .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--sky),var(--teal))}
  .facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line);border-radius:12px;overflow:hidden;margin-bottom:18px}
  .fact{background:#0a121c;padding:15px 18px}
  .fact .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .fact .v{font-family:var(--disp);font-size:15px;font-weight:700}
  .limits{border-color:rgba(255,206,77,.3)}.limits h2 .ic{color:var(--amber)}
  .limits ul{margin:14px 0 0;padding:0;list-style:none}
  .limits li{font-size:14px;color:#c4d8d5;padding:10px 0 10px 26px;position:relative;border-top:1px solid rgba(255,255,255,.05);line-height:1.6}
  .limits li:first-child{border-top:none}
  .limits li:before{content:"!";position:absolute;left:0;top:10px;width:17px;height:17px;border-radius:50%;background:rgba(255,206,77,.14);color:var(--amber);font-family:var(--disp);font-size:11px;font-weight:700;display:grid;place-items:center}
  .limits li b{color:var(--ink)}
  @media(max-width:780px){.cols{grid-template-columns:1fr}.flow{grid-template-columns:1fr 1fr}.arrow{display:none}}
</style>

<script>
const DATA = JSON.parse(document.getElementById('prediction-data').textContent);
const conf = p => p>=70?'hi':(p>=58?'md':'lo');
const esc = s => String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const ordinal = n => !n ? '—' : ((n%100>=10&&n%100<=20) ? n+'th' : n+({1:'st',2:'nd',3:'rd'}[n%10]||'th'));

/* header + banner */
document.getElementById('updated').textContent = 'Updated ' + (DATA.ingest?.ago || 'recently');
document.getElementById('seed-banner').style.display = DATA.isSeed ? '' : 'none';
document.getElementById('seed-banner').innerHTML = '⚠ Illustrative seed data — design/build preview, not a live prediction.';
document.getElementById('footer').textContent =
  'Source: ' + DATA.meta.source + ' · no betting-market inputs · auto-refresh every ' + DATA.meta.refreshEvery + ' · ' + DATA.meta.runs.toLocaleString() + ' simulations / update';

/* OVERVIEW */
function renderOverview(){
  const c = DATA.champion;
  const cp = DATA.championProgress;
  const leaders = DATA.contenders.map((t,i)=>{
    const w = Math.round(t.prob/DATA.contenders[0].prob*100);
    const d = i>2?' d':'';
    return `<div class="lead"><span>${esc(t.team)}</span><div class="tk${d}"><i style="width:${w}%"></i></div><span class="lp${d}">${t.prob}%</span></div>`;
  }).join('');
  const steps = DATA.path.map(s=>{
    const k = conf(s.pct);
    const col = k==='hi'?'var(--teal)':k==='md'?'var(--lime)':'var(--amber)';
    const glow = k==='hi'?';box-shadow:0 0 8px var(--teal)':'';
    return `<div class="step"><span class="rd">${esc(s.round)}</span><span class="op">${esc(s.opp)}<em>${esc(s.note)}</em></span><span class="pc ${k}">${s.pct}%</span><div class="sbar"><i style="width:${s.pct}%;background:${col}${glow}"></i></div></div>`;
  }).join('');
  const blend = DATA.blend.map(b=>`<div><div class="mt"><span>${esc(b.label)}</span><b>${esc(b.note)}</b></div><div class="mb"><i style="width:${b.val}%"></i></div></div>`).join('');
  document.getElementById('tab-overview').innerHTML = `
    <div class="panel">
      <div class="pt">Inference graph — signals → prediction<span class="tag">model: blend v1</span></div>
      <div class="net">
        <svg viewBox="0 0 920 240" preserveAspectRatio="xMidYMid meet">
          <path class="nlink pulse" stroke="#2af0c8" stroke-width="2" d="M150,50 C330,50 430,120 516,120" style="filter:drop-shadow(0 0 4px rgba(42,240,200,.6))"/>
          <path class="nlink pulse" stroke="#2af0c8" stroke-width="2" d="M150,120 C330,120 430,120 516,120" style="animation-delay:.45s;filter:drop-shadow(0 0 4px rgba(42,240,200,.6))"/>
          <path class="nlink pulse" stroke="#2af0c8" stroke-width="2" d="M150,190 C330,190 430,120 516,120" style="animation-delay:.9s;filter:drop-shadow(0 0 4px rgba(42,240,200,.6))"/>
          <path class="nlink pulse" stroke="#2af0c8" stroke-width="2" d="M524,120 C640,120 700,120 778,120" style="animation-delay:1.2s;filter:drop-shadow(0 0 5px rgba(42,240,200,.6))"/>
          <circle cx="150" cy="50" r="11" fill="#05080d" stroke="#49b6ff" stroke-width="2"/>
          <circle cx="150" cy="120" r="11" fill="#05080d" stroke="#2af0c8" stroke-width="2"/>
          <circle cx="150" cy="190" r="11" fill="#05080d" stroke="#a6f24d" stroke-width="2"/>
          <text x="120" y="36" fill="#86a0a0" font-size="13" text-anchor="end" font-family="Inter,sans-serif">Elo rating</text>
          <text x="120" y="125" fill="#86a0a0" font-size="13" text-anchor="end" font-family="Inter,sans-serif">Recent form</text>
          <text x="120" y="213" fill="#86a0a0" font-size="13" text-anchor="end" font-family="Inter,sans-serif">Head-to-head</text>
          <circle cx="520" cy="120" r="17" fill="#0c2a26" stroke="#2af0c8" stroke-width="2.5" style="filter:drop-shadow(0 0 9px rgba(42,240,200,.45))"/>
          <text x="520" y="160" fill="#5a7373" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">blend</text>
          <circle cx="800" cy="120" r="22" fill="#0c2a26" stroke="#2af0c8" stroke-width="2.5" style="filter:drop-shadow(0 0 10px rgba(42,240,200,.6))"/>
          <text x="800" y="125" fill="#2af0c8" font-size="13" font-weight="700" text-anchor="middle" font-family="Chakra Petch,sans-serif">${esc(c.team.slice(0,2).toUpperCase())}</text>
          <text x="800" y="162" fill="#86a0a0" font-size="11" text-anchor="middle" font-family="Inter,sans-serif">champion</text>
        </svg>
      </div>
      <div class="out">
        <div class="outbox">
          <div class="ol">Predicted champion</div>
          <div class="on"><span class="fl">${c.flag||''}</span>${esc(c.team)}</div>
          <div class="bigp">${c.prob}<small>%</small></div>
        </div>
        <div class="conf">
          <div class="cl"><span>Model confidence</span><span style="color:var(--teal)">${esc(c.confidenceLabel)}</span></div>
          <div class="meter"><i style="width:${c.confidence}%"></i></div>
          <div class="cl" style="margin-top:8px;color:var(--faint)">Three signals agree on the top tier, but the gap to the chasing pack is small — confidence is moderate, not high.</div>
        </div>
      </div>
    </div>
    <div class="cols">
      <div class="panel">
        <div class="pt">Trajectory to final<span class="tag">${esc(c.team)}</span></div>
        <div class="body">
          <div class="leg"><span><b style="background:#2af0c8;box-shadow:0 0 7px #2af0c8"></b>High</span><span><b style="background:#a6f24d"></b>Medium</span><span><b style="background:#ffce4d"></b>Toss-up</span></div>
          ${steps}
        </div>
      </div>
      <div class="panel">
        <div class="pt">The blend behind it<span class="tag">3 signals</span></div>
        <div class="body"><div class="mod">${blend}</div></div>
      </div>
    </div>
    ${cp ? `<div class="panel" style="margin-top:18px">
      <div class="pt">How ${esc(cp.team)} are tracking<span class="tag">champion watch</span></div>
      <div class="body">
        <div class="cprog">
          <div class="cstat"><div class="cl">Group ${esc(cp.group||'—')}</div><div class="cvv">${ordinal(cp.groupPos)}</div></div>
          <div class="cstat"><div class="cl">Record</div><div class="cvv">${esc(cp.record)}</div></div>
          <div class="cstat"><div class="cl">Goal diff</div><div class="cvv">${cp.gd>=0?'+':''}${cp.gd}</div></div>
          <div class="cstat"><div class="cl">Form</div><div class="formdots">${cp.form==='—'?'—':[...cp.form].map(x=>`<span class="fd-${x.toLowerCase()}">${x}</span>`).join('')}</div></div>
          <div class="cstat"><div class="cl">Elo since KO</div><div class="cvv ${cp.eloDelta>=0?'up':'dn'}">${cp.eloDelta>=0?'+':''}${cp.eloDelta}</div></div>
        </div>
        <p class="why">${esc(cp.note)} <a data-goto="scorecard" href="#">→ see full scorecard &amp; title race</a></p>
      </div></div>` : ''}
    <div class="panel" style="margin-top:18px">
      <div class="pt">Why ${esc(c.team)} — plain language<span class="tag">reasoning</span></div>
      <div class="body"><p class="why">${esc(DATA.reasoning)} <a data-goto="methodology" href="#">→ open methodology &amp; limitations</a></p></div>
    </div>`;
}

/* BRACKET */
function renderBracket(){
  const B = DATA.bracket;
  const tieHTML = (t,idx)=>{
    const [a,b,w,p,path] = t;
    const top = idx%2===0?'top':'bot';
    const ac = w===0?`team win ${conf(p)}`:'team', bc = w===1?`team win ${conf(p)}`:'team';
    const ap = w===0?`<span class="p">${p}%</span>`:'', bp = w===1?`<span class="p">${p}%</span>`:'';
    return `<div class="tie ${top} ${path?'path':''}"><div class="card">
      <div class="${ac}"><span class="nm">${esc(a)}</span>${ap}</div>
      <div class="${bc}"><span class="nm">${esc(b)}</span>${bp}</div></div></div>`;
  };
  let cols = B.rounds.map((r,ri)=>{
    const last = ri===B.rounds.length-1;
    const rc = last ? 'round pl' : ('round pr'+(ri>0?' pl':''));
    return `<div class="col"><div class="rhead">${esc(r.name)}</div><div class="${rc}">${r.ties.map(tieHTML).join('')}</div></div>`;
  }).join('');
  cols += `<div class="col champ"><div class="rhead">Predicted champion</div>
    <div class="round pl"><div class="tie"><div class="champcard">
      <div class="tr">🏆</div><div class="fl">${B.champion.flag||''}</div>
      <div class="cn">${esc(B.champion.team)}</div>
      <div class="co">${B.champion.prob}%</div><div class="cl">Title odds</div></div></div></div></div>`;
  document.getElementById('tab-bracket').innerHTML = `
    <div class="legend">
      <span><span class="sw" style="background:var(--teal)"></span>High confidence (≥70%)</span>
      <span><span class="sw" style="background:var(--lime)"></span>Medium (58–69%)</span>
      <span><span class="sw" style="background:var(--amber)"></span>Toss-up (&lt;58%)</span>
      <span><span class="pathkey"></span>Predicted champion's path</span>
    </div>
    <div class="scroller"><div class="bracket">${cols}</div></div>
    <p class="note"><b>Reading the bracket:</b> each card shows the model's projected winner (highlighted, with win probability) for that tie. Win % is per match-up, not cumulative — the chance of the trophy is the product of surviving every round. Numbers refresh automatically as results land.</p>`;
}

/* DATA */
function renderData(){
  const g = DATA.ingest;
  const groupTable = ([name,rows])=>{
    const tr = rows.map((t,i)=>{
      const [nm,p,w,d,l,gd] = t; const P = w*3+d;
      const cls = i===0?'q':(i===1?'q q2':'');
      return `<tr class="${cls}"><td class="l"><span class="pos">${i+1}</span>${esc(nm)}</td><td>${p}</td><td>${w}</td><td>${d}</td><td>${l}</td><td>${gd>0?'+'+gd:gd}</td><td class="pts">${P}</td></tr>`;
    }).join('');
    return `<div class="panel grp"><h3>Group ${esc(name)}</h3><table>
      <thead><tr><th class="l">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
      <tbody>${tr}</tbody></table></div>`;
  };
  const feed = ()=>{
    const rows = DATA.results.map(([a,b,s,d,sig,dir])=>`
      <div class="res"><span class="ta">${esc(a)}</span><span class="sc">${esc(s)}</span><span class="tb">${esc(b)}</span>
      <span class="delta"><span class="${dir}">${esc(d)} Elo</span></span>
      <span class="meta">updated → <b>${esc(sig)}</b></span></div>`).join('');
    return `<div class="panel"><div class="pt">Recent results — fed into the model<span class="tag">showing ${DATA.results.length} of ${g.groupPlayed}</span></div>${rows}</div>`;
  };
  const groupView = `<h2 class="sec">Group standings · all ${DATA.groups.length} groups</h2>
    <div class="legend"><span><span class="sw" style="background:var(--teal)"></span>1st — qualified</span><span><span class="sw" style="background:var(--sky)"></span>2nd — qualified</span><span>3rd-placed ranking decides 8 best for Round of 32</span></div>
    <div class="groups" style="margin-top:12px">${DATA.groups.map(groupTable).join('')}</div>
    <h2 class="sec">Result feed</h2>${feed()}`;
  const emptyView = `<div class="panel"><div class="empty"><div class="ei">◌</div>
    <p><b>This stage hasn't been played yet.</b></p>
    <p>Fixtures and results populate automatically once the group stage completes and the bracket is drawn. Predictions for these ties are live on the Bracket tab.</p></div></div>`;
  document.getElementById('tab-data').innerHTML = `
    <div class="panel">
      <div class="pt">Ingestion status<span class="tag">source: ${esc(DATA.meta.source)} · /fixtures</span></div>
      <div class="ingest">
        <div class="ing"><div class="k">Last fetch</div><div class="v">${esc(g.lastFetch)} <small>· ${esc(g.ago)}</small></div></div>
        <div class="ing"><div class="k">Group matches</div><div class="v ok">${g.groupPlayed} / ${g.groupTotal} <small>played</small></div></div>
        <div class="ing"><div class="k">Knockout matches</div><div class="v">${g.koPlayed} / ${g.koTotal} <small>pending</small></div></div>
        <div class="ing"><div class="k">Teams matched</div><div class="v ok">${g.teamsMatched} / ${g.teamsTotal}</div></div>
        <div class="ing"><div class="k">Elo current through</div><div class="v">${esc(g.eloThrough)}</div></div>
      </div>
      <div class="checks">${g.checks.map(c=>`<span class="chk"><b>✓</b> ${esc(c)}</span>`).join('')}</div>
    </div>
    <div class="chips" id="chips">
      <button class="chip on" data-k="group">Group stage<span class="n">${g.groupPlayed}</span></button>
      <button class="chip" data-k="r32">Round of 32<span class="n">0</span></button>
      <button class="chip" data-k="r16">Round of 16<span class="n">0</span></button>
      <button class="chip" data-k="qf">Quarters<span class="n">0</span></button>
      <button class="chip" data-k="sf">Semis<span class="n">0</span></button>
      <button class="chip" data-k="final">Final<span class="n">0</span></button>
    </div>
    <div id="data-view"></div>`;
  const views = {group:()=>groupView}; ['r32','r16','qf','sf','final'].forEach(k=>views[k]=()=>emptyView);
  const dv = document.getElementById('data-view');
  const draw = k => dv.innerHTML = views[k]();
  document.getElementById('chips').addEventListener('click',e=>{
    const b = e.target.closest('.chip'); if(!b) return;
    document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));
    b.classList.add('on'); draw(b.dataset.k);
  });
  draw('group');
}

/* METHODOLOGY */
function renderMethodology(){
  const w = DATA.weights;
  document.getElementById('tab-methodology').innerHTML = `
    <p class="why" style="font-size:17px;color:#cfe3e0;margin:4px 0 26px;max-width:62ch">This isn't a single black-box number. Every prediction starts with <b style="color:var(--ink)">real match results</b>, turns them into three independent signals, blends them, then plays the tournament out <b style="color:var(--ink)">${DATA.meta.runs.toLocaleString()} times</b> to see how often each team wins.</p>
    <div class="flow">
      <div class="fstep"><div class="n">Input 1</div><h4>Elo rating</h4><p>A running strength score. Beating a strong team earns more than beating a weak one.</p></div>
      <div class="fstep"><div class="n">Input 2</div><h4>Recent form</h4><p>Results from the last ~10 matches, so a team peaking now is weighted up.</p></div>
      <div class="fstep"><div class="n">Input 3</div><h4>Head-to-head</h4><p>History between the two specific teams in a tie.</p></div>
      <div class="arrow">→</div>
      <div class="fout"><div class="n">Output</div><h4>Monte Carlo</h4><p>Blended into one match probability, simulated ${DATA.meta.runs.toLocaleString()}× per tie.</p></div>
    </div>
    <div class="panel mpanel">
      <h2><span class="ic">◆</span> The blend<span class="w">weights are tunable</span></h2>
      <p>Each match-up gets a single win probability by combining the three signals. None of them is allowed to dominate — so one freak result or one stale rating can't swing a prediction on its own.</p>
      <div class="weights">
        <div class="wt"><div class="wl">Elo rating <span>${w.elo}%</span></div><div class="wd">Overall strength</div><div class="bar"><i style="width:${w.elo*2}%"></i></div></div>
        <div class="wt"><div class="wl">Recent form <span>${w.form}%</span></div><div class="wd">Last ~10 matches</div><div class="bar"><i style="width:${w.form*2}%"></i></div></div>
        <div class="wt"><div class="wl">Head-to-head <span>${w.h2h}%</span></div><div class="wd">This pairing's history</div><div class="bar"><i style="width:${w.h2h*2}%"></i></div></div>
      </div>
    </div>
    <div class="panel mpanel">
      <h2><span class="ic">◆</span> Why simulate ${DATA.meta.runs.toLocaleString()} times</h2>
      <p>A bracket is a chain of uncertain games. To win the trophy a team must survive every round, and an early upset reshapes everything downstream. Rather than guess one path, the model <b>plays the whole tournament out ${DATA.meta.runs.toLocaleString()} times</b>, rolling the dice on each tie using its probability. How often a team lifts the trophy across all runs <b>is</b> its title chance. That's why we show probabilities, never a fixed predicted scoreline for a game that hasn't happened.</p>
    </div>
    <div class="facts">
      <div class="fact"><div class="k">Data source</div><div class="v">${esc(DATA.meta.source)}</div></div>
      <div class="fact"><div class="k">Refresh</div><div class="v">Every ${esc(DATA.meta.refreshEvery)}</div></div>
      <div class="fact"><div class="k">Runs / update</div><div class="v">${DATA.meta.runs.toLocaleString()}</div></div>
      <div class="fact"><div class="k">Betting-market data</div><div class="v">None used</div></div>
    </div>
    <div class="panel mpanel limits">
      <h2><span class="ic">▲</span> Where it can be wrong</h2>
      <ul>
        <li><b>It can't see the unmodelled.</b> Injuries, suspensions, red cards, weather, a manager resting players — none of that is in the inputs.</li>
        <li><b>Ratings lag reality.</b> A team transformed since its last matches will be mis-rated until new results arrive.</li>
        <li><b>Head-to-head samples are tiny.</b> Two nations may have met only a handful of times; that history can mislead as easily as inform.</li>
        <li><b>Knockout football is high-variance.</b> A single match is closer to a coin flip than season-long data suggests — so a 52% favourite loses very often.</li>
        <li><b>Probabilities are not predictions.</b> An 18% champion is the most likely winner and still fails to win the trophy four times out of five.</li>
      </ul>
    </div>`;
}

/* BETTING */
function renderBetting(){
  const B = DATA.betting;
  const el = document.getElementById('tab-betting');
  if(!B){ el.innerHTML = `<div class="panel"><div class="empty"><div class="ei">◌</div>
    <p><b>Odds load on the first live build.</b></p>
    <p>The betting view populates from Singapore Pools odds once the GitHub Action runs.</p></div></div>`; return; }
  const chip = {value:'Value', diverge:'Model differs', agree:'In line'};
  const card = m => {
    const picksel = m.lean ? ({'1':0,'X':1,'2':2})[m.lean.sel] : -1;
    const box = (i,label)=>{
      const cls = (i===picksel?'pick':'') + (label===m.marketFav?' mfav':'');
      return `<div class="ob ${cls}"><span class="ol">${esc(label)}</span><span class="ov">${m.odds[i]}</span><span class="om">model ${m.model[i]}%</span></div>`;
    };
    const chiptxt = m.label==='value' ? ('Value +'+m.lean.edge+'%') : chip[m.label];
    return `<div class="bet ${m.label}">
      <div class="bh"><b>${esc(m.a)}</b><span class="vs">vs</span><b>${esc(m.b)}</b><span class="vchip ${m.label}">${chiptxt}</span></div>
      <div class="o3">${box(0,m.a)}${box(1,'Draw')}${box(2,m.b)}</div>
      <div class="bn">${esc(m.note)}</div></div>`;
  };
  const matches = B.matches && B.matches.length
    ? `<div class="betgrid">${B.matches.map(card).join('')}</div>`
    : `<div class="panel"><div class="empty"><div class="ei">◌</div><p><b>No open match odds right now.</b></p>
       <p>Singapore Pools 1X2 odds appear here when upcoming fixtures are available.</p></div></div>`;
  const orow = o => `<tr><td class="l">${esc(o.team)}</td><td>${o.modelProb}%</td>
    <td>${o.fairOdds??'—'}</td><td>${o.marketOdds??'—'}</td>
    <td class="ev ${o.label||''}">${o.edge==null?'—':((o.edge>=0?'+':'')+o.edge+'%')}</td></tr>`;
  el.innerHTML = `
    <div class="disc"><b>⚠ Not betting advice.</b> ${esc(B.disclaimer)}</div>
    <p class="betsrc">Odds: ${esc(B.source)} · updated ${esc(B.oddsUpdated)}</p>
    <h2 class="sec">Upcoming matches — model vs market</h2>
    <div class="legend2"><span><b style="background:var(--teal)"></b>Model sees a small edge</span>
      <span><b style="background:var(--amber)"></b>Model differs from market</span>
      <span><b style="background:#3a5560"></b>In line with market</span></div>
    ${matches}
    <h2 class="sec">Outright winner — model vs market</h2>
    <p class="betsrc">Market column: ${esc(B.outrightNote)}. Fair odds = 1 ÷ model probability.</p>
    <div class="panel" style="padding:4px 12px 10px">
      <table class="otable"><thead><tr><th class="l">Team</th><th>Model</th><th>Fair odds</th><th>Market</th><th>Edge</th></tr></thead>
      <tbody>${B.outright.map(orow).join('')}</tbody></table></div>`;
}

/* SCORECARD */
function renderScorecard(){
  const el = document.getElementById('tab-scorecard');
  const P = DATA.performance;
  if(!P){ el.innerHTML = `<div class="panel"><div class="empty"><div class="ei">◌</div>
    <p><b>The scorecard fills in as matches are played.</b></p>
    <p>Each result is graded against what the model predicted beforehand.</p></div></div>`; return; }
  const evo = P.evolution || [];
  let spark = '', summary = '';
  if(evo.length){
    const W=640,H=120,pad=8;
    const ys=evo.map(e=>e.champProb);
    const maxy=Math.max(...ys,1)*1.18, miny=Math.max(0,Math.min(...ys)*0.85);
    const X=i=>pad+i*(W-2*pad)/Math.max(1,evo.length-1);
    const Y=v=>H-pad-(v-miny)/((maxy-miny)||1)*(H-2*pad);
    const pts=evo.map((e,i)=>`${X(i).toFixed(1)},${Y(e.champProb).toFixed(1)}`).join(' ');
    const dots=evo.map((e,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(e.champProb).toFixed(1)}" r="${i===evo.length-1?4:2.6}" fill="${e.champRank===1?'#2af0c8':'#ffce4d'}"/>`).join('');
    const cur=evo[evo.length-1];
    spark=`<svg viewBox="0 -6 ${W} ${H+24}" preserveAspectRatio="none">
      <polygon points="${pad},${H-pad} ${pts} ${W-pad},${H-pad}" fill="rgba(42,240,200,.08)"/>
      <polyline points="${pts}" fill="none" stroke="#2af0c8" stroke-width="2" style="filter:drop-shadow(0 0 4px rgba(42,240,200,.5))"/>
      ${dots}
      <text x="${X(0).toFixed(1)}" y="${H-pad+15}" fill="#5a7373" font-size="10" font-family="Inter,sans-serif">${esc(evo[0].stage)}</text>
      <text x="${(W-pad).toFixed(1)}" y="${H-pad+15}" fill="#5a7373" font-size="10" text-anchor="end" font-family="Inter,sans-serif">${esc(cur.stage)}</text>
      <text x="${(W-pad).toFixed(1)}" y="${(Y(cur.champProb)-8).toFixed(1)}" fill="#2af0c8" font-size="12" font-weight="700" text-anchor="end" font-family="Chakra Petch,sans-serif">${cur.champProb}%</text>
    </svg>`;
    const behind=evo.filter(e=>e.champRank>1);
    if(!behind.length) summary=`<b>${esc(P.champion)}</b> have topped the model's title race at every checkpoint — currently ${cur.champProb}% to lift the trophy.`;
    else{ const worst=behind.reduce((a,b)=>b.champRank>a.champRank?b:a);
      summary=`<b>${esc(P.champion)}</b> weren't always favourite — as low as ${ordinal(worst.champRank)}, behind ${esc(worst.leader)}, around ${esc(worst.stage)} — before climbing to lead at ${cur.champProb}%.`; }
  }
  const top3=evo.length?evo[evo.length-1].top3:[];
  const rows=(P.matches||[]).map(m=>`<tr>
    <td>${esc(m.date)}</td>
    <td class="fix">${esc(m.a)} <span style="color:var(--faint)">v</span> ${esc(m.b)}</td>
    <td class="sc-pred">${esc(m.pred)} · ${m.conf}%</td>
    <td><span class="res">${esc(m.score)}</span><span class="rname">${esc(m.result)}</span></td>
    <td class="c"><span class="verdict ${m.correct?'ok':'no'}">${m.correct?'✓':'✗'}</span></td></tr>`).join('');
  el.innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="ml">Prediction accuracy</div><div class="mv">${P.accuracy}<small>%</small></div><div class="ms">${P.correct}/${P.total} correct (1 · X · 2)</div></div>
      ${P.brier!=null?`<div class="metric"><div class="ml">Brier score</div><div class="mv">${P.brier}</div><div class="ms">lower = better · ${P.brierBase} is coin-flip</div></div>`:''}
      <div class="metric"><div class="ml">Predicted champion</div><div class="mv" style="font-size:21px">${esc(P.champion)}</div><div class="ms">${top3.length?('now '+top3[0].prob+'% to win'):''}</div></div>
    </div>
    ${P.draws?`<p class="betsrc" style="margin:-6px 0 16px">Outcomes are 1 · X · 2 — <b style="color:var(--muted)">draws are predicted too</b>. ${P.draws.actual} of ${P.total} matches were drawn; the model's draw probability is calibrated to ~${P.drawCal?P.drawCal.predicted:''}% (actual ~${P.drawCal?P.drawCal.actual:''}%), but draws rarely become its single most-likely call, so it's scored on probability (Brier), not on calling them. It has called ${P.draws.correct} outright.</p>`:''}
    ${P.byOutcome?`<div class="panel" style="padding:16px 20px;margin-bottom:18px">
      <div class="pt" style="border:none;padding:0 0 12px">Accuracy by outcome<span class="tag">by actual result</span></div>
      <div class="obreak">${P.byOutcome.map(o=>`<div class="cstat"><div class="cl">${esc(o.label)}</div>
        <div class="cvv">${o.pct}<span style="font-size:13px;color:var(--muted)">%</span></div>
        <div class="cl" style="margin:6px 0 0;text-transform:none;letter-spacing:0">${o.correct}/${o.total} called</div></div>`).join('')}</div></div>`:''}
    ${P.byConfidence?`<div class="panel" style="padding:16px 20px;margin-bottom:18px">
      <div class="pt" style="border:none;padding:0 0 12px">Accuracy by confidence<span class="tag">do bolder calls land more often?</span></div>
      <div class="obreak" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">${P.byConfidence.map(c=>`<div class="cstat"><div class="cl">${esc(c.label)} · ${esc(c.range)}</div>
        <div class="cvv">${c.pct==null?'—':c.pct+'<span style="font-size:13px;color:var(--muted)">%</span>'}</div>
        <div class="cl" style="margin:6px 0 0;text-transform:none;letter-spacing:0">${c.correct}/${c.total} correct</div></div>`).join('')}</div></div>`:''}
    <div class="panel evo">
      <div class="pt" style="padding:0 0 12px;border:none">Title race — predicted champion's odds over time<span class="tag">${esc(P.champion)}</span></div>
      ${spark}
      <p class="evosum">${summary}</p>
    </div>
    <h2 class="sec">Every prediction vs result</h2>
    <p class="betsrc">Graded the moment each match finishes — newest first. "Correct" = the model's most-likely outcome matched the actual 1·X·2 result.</p>
    <div class="panel" style="padding:4px 10px 8px">
      <table class="sctable">
      <colgroup><col style="width:13%"><col style="width:33%"><col style="width:24%"><col style="width:20%"><col style="width:10%"></colgroup>
      <thead><tr><th>Date</th><th>Match</th><th>Model pick</th><th>Result</th><th class="c">Call</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
}

/* tabs */
function show(tab){
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  ['overview','bracket','scorecard','data','betting','methodology'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hide',t!==tab);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('tabs').addEventListener('click',e=>{
  const b = e.target.closest('.tab'); if(b) show(b.dataset.tab);
});
document.addEventListener('click',e=>{
  const g = e.target.closest('[data-goto]'); if(g){e.preventDefault();show(g.dataset.goto);}
});
document.getElementById('refresh').addEventListener('click',()=>{
  const u=new URL(location.href); u.searchParams.set('t',Date.now()); location.replace(u.toString());
});
document.getElementById('refresh').title =
  'Reloads the latest published build. Fresh results are recomputed by the scheduled job every ~2 hours.';

renderOverview(); renderBracket(); renderScorecard(); renderData(); renderBetting(); renderMethodology();
</script>
</body>
</html>
