name: Refresh World Cup 2026 prediction

# Rebuilds index.html with fresh predictions and deploys it to GitHub Pages.
# Tries every 30 min (GitHub throttles frequent crons, so expect ~hourly in practice);
# also runs on push and on manual dispatch from the Actions tab.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (UTC; GitHub may delay under load)
  workflow_dispatch: {}      # manual "refresh now"
  push:
    branches: [main]         # redeploy on code changes

# Least-privilege permissions for the Pages deployment flow
permissions:
  contents: read
  pages: write
  id-token: write

# One refresh at a time; a newer run supersedes an in-flight one instead of
# colliding on the Pages deployment (the main cause of transient deploy failures).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10            # never hang a stuck run
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build prediction (inject fresh data into index.html)
        run: |
          python predict.py --out index.html
          mkdir -p _site
          cp index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # More tolerant polling so a flaky Pages backend doesn't fail the run on a blip.
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000          # wait up to 10 min for the deployment
          error_count: 15          # tolerate more transient backend errors before giving up
          reporting_interval: 5000
